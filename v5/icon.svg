<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7B1FA2"/>
      <stop offset="100%" stop-color="#512DA8"/>
    </linearGradient>
    <linearGradient id="page" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="100%" stop-color="#f0eef5"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- Notebook binding strip -->
  <rect x="120" y="80" width="36" height="352" rx="4" fill="rgba(255,255,255,0.25)"/>
  <!-- Page -->
  <rect x="156" y="80" width="240" height="352" rx="6" fill="url(#page)"/>
  <!-- Ruled lines -->
  <line x1="176" y1="150" x2="376" y2="150" stroke="#d0c8e0" stroke-width="1.5"/>
  <line x1="176" y1="190" x2="376" y2="190" stroke="#d0c8e0" stroke-width="1.5"/>
  <line x1="176" y1="230" x2="376" y2="230" stroke="#d0c8e0" stroke-width="1.5"/>
  <line x1="176" y1="270" x2="376" y2="270" stroke="#d0c8e0" stroke-width="1.5"/>
  <line x1="176" y1="310" x2="376" y2="310" stroke="#d0c8e0" stroke-width="1.5"/>
  <line x1="176" y1="350" x2="376" y2="350" stroke="#d0c8e0" stroke-width="1.5"/>
  <line x1="176" y1="390" x2="376" y2="390" stroke="#d0c8e0" stroke-width="1.5"/>
  <!-- "N" letter -->
  <text x="256" y="300" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="200" font-weight="bold" fill="#7B1FA2" opacity="0.15">N</text>
  <!-- Pen icon -->
  <g transform="translate(330, 340) rotate(-45)">
    <rect x="-6" y="-60" width="12" height="50" rx="2" fill="#FFD54F"/>
    <polygon points="-6,-10 6,-10 0,6" fill="#FFD54F"/>
    <polygon points="-3,-2 3,-2 0,6" fill="#333"/>
    <rect x="-6" y="-62" width="12" height="8" rx="1" fill="#E0A0C0"/>
  </g>
  <!-- Binding rings -->
  <circle cx="138" cy="120" r="8" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="3"/>
  <circle cx="138" cy="180" r="8" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="3"/>
  <circle cx="138" cy="240" r="8" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="3"/>
  <circle cx="138" cy="300" r="8" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="3"/>
  <circle cx="138" cy="360" r="8" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="3"/>
</svg>
